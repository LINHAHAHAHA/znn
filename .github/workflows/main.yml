name: 构建Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 查看项目结构
        run: |
          echo "=== 项目根目录 ==="
          ls -la
          echo ""
          echo "=== gradle目录 ==="
          if [ -d "gradle" ]; then ls -la gradle/; fi
          if [ -d "gradle/wrapper" ]; then ls -la gradle/wrapper/; fi
      
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: 设置Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 检查并修复Gradle Wrapper
        run: |
          echo "检查gradle-wrapper.jar..."
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar不存在，使用gradle命令初始化..."
            gradle wrapper --gradle-version=8.0
          else
            echo "gradle-wrapper.jar存在"
            ls -lh gradle/wrapper/gradle-wrapper.jar
          fi
          
          echo "检查gradlew..."
          if [ ! -f "gradlew" ]; then
            echo "gradlew不存在，使用gradle命令生成..."
            gradle wrapper --gradle-version=8.0
          fi
          
          chmod +x gradlew
          echo "Gradle Wrapper已准备就绪"
          ls -la gradlew
      
      - name: 清理项目
        run: ./gradlew clean
      
      - name: 构建Debug APK
        run: ./gradlew assembleDebug --stacktrace
      
      - name: 查找生成的APK
        run: |
          echo "=== 查找APK文件 ==="
          find . -name "*.apk" -type f
      
      - name: 上传APK到Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 公安接处警平台-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      
      - name: 获取APK信息
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✓ APK构建成功！"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "✗ APK构建失败"
            exit 1
          fi

